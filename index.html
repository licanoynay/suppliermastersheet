<script>
const FIELDS=["supplierName","equipmentName","hireLevel","equipmentRate","transportRate","location"];
const LABELS=["Supplier","Equipment","Hire Level","Supplier Rate","Transport Rate","Location"];
const records=window.__PRESCO_DATA__||[];

function dedupe(recs){
  const seen=new Set();const out=[];
  for(const r of recs){
    const key=FIELDS.map(f=>String(r[f]||"").toLowerCase().trim()).join("|");
    if(!seen.has(key)){seen.add(key);out.push(r);}
  }
  return out;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function tableHTML(rows,showSource){
  let h='<div class="tbl-wrap"><table><thead><tr>';
  LABELS.forEach(l=>h+='<th>'+l+'</th>');
  if(showSource)h+='<th>Source</th>';
  h+='</tr></thead><tbody>';
  rows.forEach(r=>{
    h+='<tr>';
    FIELDS.forEach(f=>{
      let v=esc(String(r[f]||"N/A"));
      if(f==="hireLevel"&&v!=="N/A")v='<span class="badge">'+v+'</span>';
      if(f==="supplierName")v='<strong>'+v+'</strong>';
      h+='<td>'+v+'</td>';
    });
    if(showSource)h+='<td style="font-size:12px;color:#6b7280">'+esc(r._source||"")+'</td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}
function renderData(){
  const q=(document.getElementById("searchInput").value||"").toLowerCase();
  const deduped=dedupe(records);
  const filtered=q?deduped.filter(r=>FIELDS.some(f=>String(r[f]||"").toLowerCase().includes(q))||String(r._source||"").toLowerCase().includes(q)):deduped;
  const sources=[...new Set(records.map(r=>r._source))];
  document.getElementById("statRecords").textContent=deduped.length;
  document.getElementById("statSuppliers").textContent=[...new Set(records.map(r=>r.supplierName).filter(Boolean))].length;
  document.getElementById("statDocs").textContent=sources.length;
  document.getElementById("statLocs").textContent=[...new Set(records.map(r=>r.location).filter(l=>l&&l!=="N/A"))].length;
  const content=document.getElementById("content");
  if(!deduped.length){content.innerHTML='<p style="color:#9ca3af;text-align:center;padding:2rem;border:1.5px dashed #c8daf0;border-radius:10px">No records in this database.</p>';return;}
  if(q){
    content.innerHTML='<p class="count">'+filtered.length+' result'+(filtered.length!==1?'s':'')+' for "'+esc(q)+'"</p>'+tableHTML(filtered,true);
  }else{
    let h='';
    sources.forEach(src=>{
      const srcRecs=deduped.filter(r=>r._source===src);
      if(!srcRecs.length)return;
      const supplier=srcRecs[0]?srcRecs[0].supplierName:"";
      h+='<div class="doc-title">📄 '+esc(src)+(supplier?' <span class="badge">'+esc(supplier)+'</span>':'')+' <span style="color:#9ca3af;font-weight:400;font-size:12px">— '+srcRecs.length+' record'+(srcRecs.length!==1?'s':'')+'</span></div>';
      h+=tableHTML(srcRecs,false);
    });
    content.innerHTML=h;
  }
}
function doExport(){
  const deduped=dedupe(records);
  const wsData=[LABELS.concat(["Source"])].concat(deduped.map(r=>FIELDS.map(f=>r[f]||"N/A").concat([r._source||""])));
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws["!cols"]=[22,22,12,16,16,18,28].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,"Hire Database");
  XLSX.writeFile(wb,"presco-hire-database-"+new Date().toISOString().slice(0,10)+".xlsx");
}
renderData();
</script>
